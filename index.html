```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Employee Performance Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial,sans-serif;
background:#f4f6f9;
margin:0;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
margin-bottom:20px;
}

.kpi-container{
display:flex;
gap:15px;
flex-wrap:wrap;
margin-bottom:20px;
}

.kpi{
flex:1;
min-width:200px;
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.kpi h3{
margin:0;
font-size:15px;
color:#666;
}

.kpi h2{
margin-top:10px;
}

.chart-container{
height:400px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
border:1px solid #ddd;
padding:8px;
font-size:13px;
}

th{
background:black;
color:white;
position:sticky;
top:0;
}

.table-container{
max-height:500px;
overflow:auto;
}

.filters{
display:flex;
gap:10px;
margin-bottom:20px;
flex-wrap:wrap;
}

select,input{
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

</style>

</head>

<body>

<h1>📊 Employee Performance Dashboard</h1>

<div class="filters">

<select id="employeeFilter">
<option value="All">All Employees</option>
</select>

<input type="text" id="searchBox" placeholder="Search Employee">

</div>

<div class="kpi-container">

<div class="kpi">
<h3>Total Employees</h3>
<h2 id="totalEmployees">0</h2>
</div>

<div class="kpi">
<h3>Total Actual Mins</h3>
<h2 id="totalActual">0</h2>
</div>

<div class="kpi">
<h3>Total OT Mins</h3>
<h2 id="totalOT">0</h2>
</div>

<div class="kpi">
<h3>Total Attendance</h3>
<h2 id="attendance">0</h2>
</div>

</div>

<div class="card">

<h2>🏆 Top Performer</h2>

<h3 id="topPerformer">Loading...</h3>

</div>

<div class="card">

<h2>📈 Actual Minutes By Employee</h2>

<div class="chart-container">
<canvas id="actualChart"></canvas>
</div>

</div>

<div class="card">

<h2>⏰ OT Minutes By Employee</h2>

<div class="chart-container">
<canvas id="otChart"></canvas>
</div>

</div>

<div class="card">

<h2>📋 Sheet Data</h2>

<div class="table-container">

<table id="dataTable">

<thead></thead>

<tbody></tbody>

</table>

</div>

</div>

<script>

const CSV_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vSmMQ61nTN0z7DyrVUJntuEm_zXVbukY5P56YsDU0wlDWhLoybtlVp3kcx96F8ZyD7segyJQlnSKZNq/pub?gid=1309836775&single=true&output=csv";

fetch(CSV_URL)

.then(res => res.text())

.then(csv => {

const rows = csv.trim().split("\n");

const headers = rows[0]
.split(",")
.map(h => h.replace(/"/g,"").trim());

const data = rows.slice(1).map(row => {

const values = row.split(",");

let obj = {};

headers.forEach((h,i) => {
obj[h] = values[i]
? values[i].replace(/"/g,"").trim()
: "";
});

return obj;

});

const employees = data.filter(
r => r["Name"] && r["Name"] !== ""
);

const uniqueEmployees = [
...new Set(employees.map(e => e["Name"]))
];

const employeeFilter =
document.getElementById("employeeFilter");

uniqueEmployees.forEach(emp => {

const option = document.createElement("option");

option.value = emp;
option.textContent = emp;

employeeFilter.appendChild(option);

});

document.getElementById("totalEmployees")
.innerText = uniqueEmployees.length;

const totalActual = employees.reduce(
(sum,row) => sum + (Number(row["Actual Mins."]) || 0),
0
);

document.getElementById("totalActual")
.innerText = Math.round(totalActual);

const totalOT = employees.reduce(
(sum,row) => sum + (Number(row["OT Mins"]) || 0),
0
);

document.getElementById("totalOT")
.innerText = Math.round(totalOT);

const attendance = employees.filter(
row => row["P"] === "P"
).length;

document.getElementById("attendance")
.innerText = attendance;

let bestEmployee = "";
let bestScore = 0;

employees.forEach(emp => {

const score =
Number(emp["Actual Mins."]) || 0;

if(score > bestScore){

bestScore = score;
bestEmployee = emp["Name"];

}

});

document.getElementById("topPerformer")
.innerText =
bestEmployee + " (" + bestScore + ")";

let head = "<tr>";

headers.forEach(h => {
head += `<th>${h}</th>`;
});

head += "</tr>";

document.querySelector("#dataTable thead")
.innerHTML = head;

function renderTable(filtered){

let body = "";

filtered.forEach(row => {

body += "<tr>";

headers.forEach(h => {
body += `<td>${row[h]}</td>`;
});

body += "</tr>";

});

document.querySelector("#dataTable tbody")
.innerHTML = body;

}

renderTable(employees);

const labels =
employees.map(r => r["Name"]);

const actualValues =
employees.map(
r => Number(r["Actual Mins."]) || 0
);

const otValues =
employees.map(
r => Number(r["OT Mins"]) || 0
);

new Chart(
document.getElementById("actualChart"),
{
type:"bar",
data:{
labels:labels,
datasets:[{
label:"Actual Mins",
data:actualValues
}]
},
options:{
responsive:true,
maintainAspectRatio:false
}
}
);

new Chart(
document.getElementById("otChart"),
{
type:"bar",
data:{
labels:labels,
datasets:[{
label:"OT Minutes",
data:otValues
}]
},
options:{
responsive:true,
maintainAspectRatio:false
}
}
);

employeeFilter.addEventListener(
"change",
function(){

const selected = this.value;

const filtered =
selected === "All"
? employees
: employees.filter(
r => r["Name"] === selected
);

renderTable(filtered);

}
);

document.getElementById("searchBox")
.addEventListener(
"keyup",
function(){

const search =
this.value.toLowerCase();

const filtered =
employees.filter(
r =>
(r["Name"] || "")
.toLowerCase()
.includes(search)
);

renderTable(filtered);

}
);

})

.catch(error => {

console.error(error);

alert("Error loading CSV data.");

});

</script>

</body>
</html>
