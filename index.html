<script>

const CSV_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vSmMQ61nTN0z7DyrVUJntuEm_zXVbukY5P56YsDU0wlDWhLoybtlVp3kcx96F8ZyD7segyJQlnSKZNq/pub?gid=1309836775&single=true&output=csv";

let actualChart;
let qcChart;

fetch(CSV_URL)
.then(response => response.text())
.then(csv => {

const rows = csv.split(/\r?\n/).filter(r => r.trim());

const headers = rows[0]
.split(",")
.map(h => h.replace(/"/g,"").trim());

const data = rows.slice(1).map(row => {

const values =
row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g) || [];

let obj = {};

headers.forEach((header,index)=>{

obj[header] =
(values[index] || "")
.replace(/^"|"$/g,"")
.trim();

});

return obj;

});

const employees =
data.filter(row => row["Name"]);

const employeeFilter =
document.getElementById("employeeFilter");

const dateFilter =
document.getElementById("dateFilter");

const searchBox =
document.getElementById("searchBox");

const uniqueEmployees =
[...new Set(
employees.map(e => e["Name"])
)].sort();

uniqueEmployees.forEach(emp => {

const option =
document.createElement("option");

option.value = emp;
option.textContent = emp;

employeeFilter.appendChild(option);

});

function renderTable(filteredData){

let head = "<tr>";

headers.forEach(header => {

head += `<th>${header}</th>`;

});

head += "</tr>";

document.querySelector(
"#dataTable thead"
).innerHTML = head;

let body = "";

filteredData.forEach(row => {

body += "<tr>";

headers.forEach(header => {

body += `<td>${row[header] || ""}</td>`;

});

body += "</tr>";

});

document.querySelector(
"#dataTable tbody"
).innerHTML = body;

}

function updateKPIs(filteredData){

document.getElementById(
"totalEmployees"
).innerText =
new Set(
filteredData.map(r => r["Name"])
).size;

const totalActual =
filteredData.reduce(
(sum,row)=>
sum +
(Number(row["Actual Mins."]) || 0),
0
);

document.getElementById(
"totalActual"
).innerText =
Math.round(totalActual);

const totalQC =
filteredData.reduce(
(sum,row)=>
sum +
(Number(row["QC / Filteration"]) || 0),
0
);

document.getElementById(
"totalQC"
).innerText = totalQC;

const totalAutopix =
filteredData.reduce(
(sum,row)=>
sum +
(Number(row["Autopix Editing"]) || 0),
0
);

document.getElementById(
"totalAutopix"
).innerText = totalAutopix;

const attendance =
filteredData.filter(
r => r["P"] === "P"
).length;

document.getElementById(
"attendance"
).innerText = attendance;

let bestEmployee = "";
let bestValue = 0;

filteredData.forEach(emp => {

const value =
Number(emp["Actual Mins."]) || 0;

if(value > bestValue){

bestValue = value;
bestEmployee = emp["Name"];

}

});

document.getElementById(
"topPerformer"
).innerText =
bestEmployee
? `${bestEmployee} (${bestValue})`
: "No Data";

}

function updateCharts(filteredData){

const labels =
filteredData.map(
r => r["Name"]
);

const actualData =
filteredData.map(
r =>
Number(r["Actual Mins."]) || 0
);

if(actualChart){
actualChart.destroy();
}

actualChart =
new Chart(
document.getElementById(
"actualChart"
),
{
type:"bar",
data:{
labels:labels,
datasets:[
{
label:"Actual Minutes",
data:actualData
}
]
},
options:{
responsive:true
}
}
);

if(qcChart){
qcChart.destroy();
}

qcChart =
new Chart(
document.getElementById(
"qcChart"
),
{
type:"bar",
data:{
labels:labels,
datasets:[
{
label:"QC",
data:
filteredData.map(
r =>
Number(
r["QC / Filteration"]
) || 0
)
},
{
label:"Autopix",
data:
filteredData.map(
r =>
Number(
r["Autopix Editing"]
) || 0
)
}
]
},
options:{
responsive:true
}
}
);

}

function applyFilters(){

const employee =
employeeFilter.value;

const selectedDate =
dateFilter.value;

const search =
searchBox.value
.toLowerCase();

let filtered = [...employees];

if(employee !== "All"){

filtered =
filtered.filter(
r => r["Name"] === employee
);

}

if(selectedDate){

const dateColumn =
headers.find(
h =>
h.toLowerCase()
.includes("date")
);

if(dateColumn){

filtered =
filtered.filter(
r =>
(r[dateColumn] || "")
.includes(selectedDate)
);

}

}

if(search){

filtered =
filtered.filter(
r =>
(r["Name"] || "")
.toLowerCase()
.includes(search)
);

}

renderTable(filtered);
updateKPIs(filtered);
updateCharts(filtered);

}

employeeFilter.addEventListener(
"change",
applyFilters
);

dateFilter.addEventListener(
"change",
applyFilters
);

searchBox.addEventListener(
"keyup",
applyFilters
);

renderTable(employees);
updateKPIs(employees);
updateCharts(employees);

})
.catch(error => {

console.error(error);

alert(
"Unable to load Google Sheet CSV"
);

});

</script>
