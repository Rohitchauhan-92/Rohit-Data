
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional Employee Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<style>
body{margin:0;font-family:Segoe UI,Arial;background:#0f172a;color:#fff}
.header{padding:20px}
.filters,.kpis{display:grid;gap:12px}
.filters{grid-template-columns:repeat(auto-fit,minmax(220px,1fr));padding:0 20px}
.kpis{grid-template-columns:repeat(auto-fit,minmax(180px,1fr));padding:20px}
.card{background:#1e293b;border-radius:12px;padding:15px}
.kpi{background:#111827;border-radius:12px;padding:15px}
.kpi h4{margin:0;color:#cbd5e1}.kpi h2{margin:8px 0}
select,input{padding:10px;border-radius:8px;border:none}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:0 20px 20px}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #334155;padding:6px;font-size:12px}
th{background:#020617;position:sticky;top:0}
.tbl{max-height:400px;overflow:auto}
@media(max-width:900px){.grid2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="header"><h1>📊 Employee Performance Dashboard</h1></div>

<div class="filters">
<select id="employee"><option value="All">All Employees</option></select>
<input id="search" placeholder="Search employee">
</div>

<div class="kpis">
<div class="kpi"><h4>Total Employees</h4><h2 id="emp">0</h2></div>
<div class="kpi"><h4>Total Actual Mins</h4><h2 id="actual">0</h2></div>
<div class="kpi"><h4>Total OT Mins</h4><h2 id="ot">0</h2></div>
<div class="kpi"><h4>Attendance</h4><h2 id="att">0</h2></div>
<div class="kpi"><h4>Leave</h4><h2 id="leave">0</h2></div>
<div class="kpi"><h4>Absent</h4><h2 id="absent">0</h2></div>
<div class="kpi"><h4>Weekoff</h4><h2 id="wo">0</h2></div>
<div class="kpi"><h4>Holiday</h4><h2 id="holiday">0</h2></div>
</div>

<div class="grid2">
<div class="card"><h3>Actual Minutes</h3><canvas id="actualChart"></canvas></div>
<div class="card"><h3>OT Minutes</h3><canvas id="otChart"></canvas></div>
</div>

<div class="grid2">
<div class="card">
<h3>Top Performers</h3>
<div class="tbl"><table id="rank"><thead><tr><th>Rank</th><th>Name</th><th>Actual</th></tr></thead><tbody></tbody></table></div>
</div>
<div class="card">
<h3>Employee Profile</h3>
<div id="profile">Select an employee</div>
</div>
</div>

<div class="card" style="margin:20px">
<h3>Data Table</h3>
<div class="tbl"><table id="data"><thead></thead><tbody></tbody></table></div>
</div>

<script>
const CSV_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vSmMQ61nTN0z7DyrVUJntuEm_zXVbukY5P56YsDU0wlDWhLoybtlVp3kcx96F8ZyD7segyJQlnSKZNq/pub?gid=1309836775&single=true&output=csv";
let allData=[],headers=[];
function num(v){return Number(String(v||"0").replace(/,/g,''))||0}

Papa.parse(CSV_URL,{
 download:true,header:true,skipEmptyLines:true,
 complete:r=>{
  allData=r.data.filter(x=>x["Name"]);
  headers=Object.keys(allData[0]||{});
  document.querySelector("#data thead").innerHTML="<tr>"+headers.map(h=>"<th>"+h+"</th>").join("")+"</tr>";
  [...new Set(allData.map(x=>x["Name"]))].sort().forEach(n=>employee.innerHTML+=`<option>${n}</option>`);
  render(allData);
 }
});

function render(rows){
 emp.innerText=[...new Set(rows.map(x=>x["Name"]))].length;
 actual.innerText=Math.round(rows.reduce((s,r)=>s+num(r["Actual Mins."]),0));
 ot.innerText=Math.round(rows.reduce((s,r)=>s+num(r["OT Mins."]),0));
 att.innerText=Math.round(rows.reduce((s,r)=>s+num(r["P"]),0));
 leave.innerText=Math.round(rows.reduce((s,r)=>s+num(r["Leave"]),0));
 absent.innerText=Math.round(rows.reduce((s,r)=>s+num(r["Absent"]),0));
 wo.innerText=Math.round(rows.reduce((s,r)=>s+num(r["WO"]),0));
 holiday.innerText=Math.round(rows.reduce((s,r)=>s+num(r["Holiday"]),0));

 const top=[...rows].sort((a,b)=>num(b["Actual Mins."])-num(a["Actual Mins."])).slice(0,20);
 rank.querySelector("tbody").innerHTML=top.map((r,i)=>`<tr><td>${i+1}</td><td>${r["Name"]}</td><td>${num(r["Actual Mins."])}</td></tr>`).join("");

 data.querySelector("tbody").innerHTML=rows.slice(0,500).map(r=>"<tr>"+headers.map(h=>`<td>${r[h]??""}</td>`).join("")+"</tr>").join("");

 if(window.c1) c1.destroy();
 if(window.c2) c2.destroy();
 c1=new Chart(actualChart,{type:'bar',data:{labels:top.map(x=>x["Name"]),datasets:[{label:'Actual',data:top.map(x=>num(x["Actual Mins."]))}]}});
 c2=new Chart(otChart,{type:'bar',data:{labels:top.map(x=>x["Name"]),datasets:[{label:'OT',data:top.map(x=>num(x["OT Mins."]))}]}});

 if(rows.length===1){
   let r=rows[0];
   profile.innerHTML=`<b>${r["Name"]}</b><br>EMP ID: ${r["EMP ID"]||"-"}<br>Shift: ${r["Shift"]||"-"}<br>TL: ${r["Shift TL"]||"-"}<br>Actual: ${r["Actual Mins."]||0}<br>OT: ${r["OT Mins."]||0}`;
 } else profile.innerHTML="Select an employee";
}

employee.onchange=()=>{
 const v=employee.value;
 render(v==="All"?allData:allData.filter(x=>x["Name"]===v));
};
search.oninput=()=>{
 const s=search.value.toLowerCase();
 render(allData.filter(x=>(x["Name"]||"").toLowerCase().includes(s)));
};
</script>
</body>
</html>
